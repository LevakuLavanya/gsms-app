<section class="users-page">
  <header class="page-header">
    <div>
      <h1>Users</h1>
      <p>Manage laboratory staff accounts and roles.</p>
    </div>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Add User
    </button>
  </header>

  <mat-card appearance="outlined" class="table-card">
    @if (loading()) {
      <mat-progress-bar mode="indeterminate" />
    }

    <div class="table-scroll">
      <table mat-table [dataSource]="users()" class="users-table">
        <ng-container matColumnDef="uid">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let u">{{ u.uid }}</td>
        </ng-container>

        <ng-container matColumnDef="fname">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let u">{{ u.fname }}</td>
        </ng-container>

        <ng-container matColumnDef="uname">
          <th mat-header-cell *matHeaderCellDef>Username</th>
          <td mat-cell *matCellDef="let u">{{ u.uname }}</td>
        </ng-container>

        <ng-container matColumnDef="mail">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let u">{{ u.mail || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="mob">
          <th mat-header-cell *matHeaderCellDef>Mobile</th>
          <td mat-cell *matCellDef="let u">{{ u.mob || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let u">{{ roleName(u.rid) }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
          <td mat-cell *matCellDef="let u" class="actions-col">
            <button mat-icon-button color="primary" matTooltip="Edit" (click)="openEdit(u)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Delete" (click)="confirmDelete(u)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    @if (!loading() && users().length === 0) {
      <div class="empty-state">
        <mat-icon>group_off</mat-icon>
        <p>No users found.</p>
      </div>
    }

    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPage($event)"
    />
  </mat-card>
</section>
